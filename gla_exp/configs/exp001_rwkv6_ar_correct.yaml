# AR Student + 原始因果顺序 → 理论下界
teacher:
  model_name: "fla-hub/gla-340M-15B"
  layer_idx: 3          # 使用前 4 层（0-indexed，截取后取最后一层输出）
  seq_len: 32
  batch_size: 8
  n_batches: 100
  dataset_name: "wikitext"
  cache_path: "data/teacher_cache"

student:
  type: ar_correct
  d_model: 256
  n_layers: 4
  n_heads: 4
  mask_ratio: 0.0

training:
  lr: 3.0e-4
  epochs: 100
  batch_size: 64
  log_interval: 5
  val_ratio: 0.1
